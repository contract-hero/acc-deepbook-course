[package]
name = "arb_executor"
edition = "2024"

[dependencies]
# DeepBook Move source dependencies.
#
# These point at the deepbook-sandbox worktree that the live localnet was
# published from (chain-id 22947bed). Move.toml cannot read env vars, so the
# paths are absolute. Once the sandbox-build fix merges, repoint these at the
# canonical tree:
#   token    = { local = "<HOME>/workspace/deepbook-sandbox/sandbox/.external-packages/token" }
#   deepbook = { local = "<HOME>/workspace/deepbook-sandbox/sandbox/.external-packages/deepbook" }
token = { local = "/Users/alilloig/workspace/deepbook-sandbox/.claude/worktrees/fix-esbuild-build/sandbox/.external-packages/token" }
deepbook = { local = "/Users/alilloig/workspace/deepbook-sandbox/.claude/worktrees/fix-esbuild-build/sandbox/.external-packages/deepbook" }

# The deepbook dependency declares a `localnet` environment, so building/testing
# this package must target the same environment: `sui move test -e localnet`.
# The named address `arb_executor` is bound at publish time (do NOT add an
# explicit `[addresses]` block — it conflicts with environment-based address
# resolution and makes the build reject the `localnet` environment).
# The value below is the live sandbox localnet chain-id (from Pub.localnet.toml);
# if you re-genesis the sandbox, update it to match `sui client chain-identifier`.
[environments]
localnet = "22947bed"
